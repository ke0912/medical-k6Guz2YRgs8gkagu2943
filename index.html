<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>薬管理サイト</title>

<style>

body{
font-family: sans-serif;
padding: 15px;
background: #f5f5f5;
}

h1{
text-align: center;
}

input{
width: 100%;
padding: 10px;
margin-top: 10px;
box-sizing: border-box;
font-size: 16px;
}

button{
width: 100%;
padding: 10px;
margin-top: 10px;
font-size: 16px;
}

table{
width: 100%;
border-collapse: collapse;
margin-top: 20px;
background: white;
}

th, td{
border: 1px solid #ccc;
padding: 8px;
word-break: break-word;
}

th{
background: #e0e0e0;
}

.deleteBtn{
background: red;
color: white;
border: none;
padding: 5px 10px;
}

</style>
</head>

<body>

<h1>薬管理サイト</h1>

<input type="text"
id="medicineName"
placeholder="薬の名前">

<input type="text"
id="medicineEffect"
placeholder="効果、頻度">

<button onclick="addMedicine()">
追加
</button>

<input type="text"
id="searchBox"
placeholder="検索"
onkeyup="searchMedicine()">

<table id="medicineTable">

<thead>
<tr>
<th>薬名</th>
<th>効果</th>
<th>削除</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC4jekFXVoYZS6lFPKrm_UDoLykGtlaXQs",
authDomain: "shared-note-acb32.firebaseapp.com",
projectId: "shared-note-acb32",
storageBucket: "shared-note-acb32.firebasestorage.app",
messagingSenderId: "104453033051",
appId: "1:104453033051:web:9cc377df9b8a13b212437e"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let medicines = [];

const password = "1511";

let input =
prompt("パスワードを入力");

input = input.replace(
/[０-９]/g,
function(s){

return String.fromCharCode(
s.charCodeAt(0) - 65248
);

}
);

if(input !== password){

alert("パスワードが違います");

location.href =
"https://google.com";

}




onSnapshot(
collection(db, "medicines"),
(snapshot) => {

medicines = [];

snapshot.forEach((docData) => {

medicines.push({
id: docData.id,
name: docData.data().name,
effect: docData.data().effect
});

});

displayMedicines();

});

window.addMedicine =
async function(){

const name =
document.getElementById(
"medicineName"
).value;

const effect =
document.getElementById(
"medicineEffect"
).value;

if(name === "" || effect === ""){

alert("入力してください");

return;
}

await addDoc(
collection(db, "medicines"),
{
name: name,
effect: effect
}
);

document.getElementById(
"medicineName"
).value = "";

document.getElementById(
"medicineEffect"
).value = "";

};

function displayMedicines(){

const tbody =
document.querySelector(
"#medicineTable tbody"
);

tbody.innerHTML = "";

medicines.forEach((medicine) => {

const row =
document.createElement("tr");

row.innerHTML = `
<td>${medicine.name}</td>
<td>${medicine.effect}</td>
<td>
<button class="deleteBtn"
onclick="deleteMedicine('${medicine.id}')">
削除
</button>
</td>
`;

tbody.appendChild(row);

});

}

window.deleteMedicine =
async function(id){

const result =
confirm("本当に削除しますか？");

if(result){

await deleteDoc(
doc(db, "medicines", id)
);

}

};

window.hiraToKata = function(str){

return str.replace(
/[\u3041-\u3096]/g,
function(match){

return String.fromCharCode(
match.charCodeAt(0) + 0x60
);

}
);

};

window.searchMedicine =
function(){

const keyword =
window.hiraToKata(
document.getElementById("searchBox")
.value
);

const rows =
document.querySelectorAll(
"#medicineTable tbody tr"
);

rows.forEach(row => {

const name =
window.hiraToKata(
row.cells[0].textContent
);

const effect =
window.hiraToKata(
row.cells[1].textContent
);

if(
name.includes(keyword)
||
effect.includes(keyword)
){

row.style.display = "";

}else{

row.style.display = "none";

}

});

};


};

</script>

</body>
</html>
